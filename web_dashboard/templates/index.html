<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>PKU Venue Booking</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h1 { color: #333; }
        .card { border: 1px solid #ddd; border-radius: 8px; padding: 20px; margin: 20px 0; }
        .btn { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 5px; }
        .btn-primary { background: #007bff; color: white; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-success { background: #28a745; color: white; }
        .status { font-size: 14px; color: #666; margin-top: 10px; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; max-height: 300px; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; }
        td, th { border: 1px solid #ddd; padding: 8px; text-align: left; }
    </style>
</head>
<body>
    <h1>🏸 PKU Venue Auto Booking</h1>

    <div class="card">
        <h2>当前状态</h2>
        <div id="status" class="status">加载中...</div>
        <button class="btn btn-primary" onclick="refreshStatus()">刷新状态</button>
    </div>

    <div class="card">
        <h2>手动预约</h2>
        <button class="btn btn-success" onclick="runBooking()">立即预约</button>
        <div id="run-result" class="status"></div>
    </div>

    <div class="card">
        <h2>定时任务</h2>
        <p>设置定时自动预约</p>
        <button class="btn btn-success" onclick="schedule('enable', 24)">启用（每24小时）</button>
        <button class="btn btn-danger" onclick="schedule('disable')">停用</button>
        <div id="schedule-result" class="status"></div>
    </div>

    <div class="card">
        <h2>最近日志</h2>
        <button class="btn btn-primary" onclick="refreshLogs()">刷新日志</button>
        <pre id="logs">加载中...</pre>
    </div>

    <script>
        function refreshStatus() {
            fetch('/status').then(r => r.json()).then(d => {
                document.getElementById('status').innerHTML =
                    `<table>
                        <tr><td>状态</td><td>${d.status || 'unknown'}</td></tr>
                        <tr><td>最后运行</td><td>${d.last_run || '无'}</td></tr>
                        <tr><td>配置</td><td>${d.config || '-'}</td></tr>
                        <tr><td>场地</td><td>${d.venue || '-'}</td></tr>
                    </table>`;
            });
        }
        function runBooking() {
            document.getElementById('run-result').innerText = '运行中...';
            fetch('/run', {method: 'POST'}).then(r => r.json()).then(d => {
                document.getElementById('run-result').innerText =
                    `完成 (${d.returncode === 0 ? '成功' : '失败'})\n${d.stdout}`;
                refreshStatus();
            });
        }
        function schedule(action, hours) {
            document.getElementById('schedule-result').innerText = '处理中...';
            fetch('/schedule', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({action, hours})
            }).then(r => r.json()).then(d => {
                document.getElementById('schedule-result').innerText = d.message || d.error;
            });
        }
        function refreshLogs() {
            fetch('/logs').then(r => r.json()).then(d => {
                document.getElementById('logs').innerText = d.lines.join('');
            });
        }
        refreshStatus();
        refreshLogs();
        setInterval(refreshStatus, 30000);
    </script>
</body>
</html>
