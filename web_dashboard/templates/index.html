<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>PKU Venue Booking</title>
    <style>
        :root { color-scheme: light; }
        body { margin: 0; font-family: Arial, "Microsoft YaHei", sans-serif; background: #f7f8fa; color: #20242a; }
        main { max-width: 1120px; margin: 0 auto; padding: 28px 20px 48px; }
        h1 { margin: 0 0 18px; font-size: 26px; }
        h2 { margin: 0 0 14px; font-size: 18px; }
        section { background: #fff; border: 1px solid #d8dee8; border-radius: 8px; padding: 18px; margin: 16px 0; }
        label { display: block; font-size: 13px; margin: 8px 0 4px; color: #4a5564; }
        input, select, textarea { width: 100%; box-sizing: border-box; border: 1px solid #c8d0dc; border-radius: 6px; padding: 8px 10px; font-size: 14px; background: #fff; }
        textarea { min-height: 72px; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; }
        button { border: 0; border-radius: 6px; padding: 9px 14px; cursor: pointer; font-size: 14px; background: #1769aa; color: #fff; }
        button.secondary { background: #44546a; }
        button.danger { background: #b42318; }
        button:disabled { opacity: .55; cursor: wait; }
        .grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 12px; }
        .wide { grid-column: span 3; }
        .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 14px; }
        .status { white-space: pre-wrap; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; background: #eef2f6; border-radius: 6px; padding: 10px; min-height: 24px; }
        table { width: 100%; border-collapse: collapse; margin-top: 8px; }
        th, td { border: 1px solid #d8dee8; padding: 8px; text-align: left; vertical-align: top; }
        th { background: #eef2f6; }
        .small { font-size: 12px; color: #5d6978; }
        @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } .wide { grid-column: span 1; } }
    </style>
</head>
<body>
<main>
    <h1>PKU 场馆预约控制台</h1>

    <section>
        <h2>本地配置</h2>
        <div class="grid">
            <div>
                <label>配置文件</label>
                <input id="config-path" value="config.ini">
            </div>
            <div>
                <label>浏览器</label>
                <select id="browser"><option value="firefox">firefox</option><option value="chrome">chrome</option></select>
            </div>
            <div>
                <label>快速模板</label>
                <select id="venue-template">
                    <option value="">不覆盖</option>
                    <option value="五四体育中心-羽毛球馆">五四体育中心-羽毛球馆</option>
                    <option value="邱德拔体育馆-羽毛球场">邱德拔体育馆-羽毛球场</option>
                </select>
            </div>
        </div>
        <div id="config-fields" class="grid"></div>
        <div class="grid">
            <div>
                <label>日期或星期</label>
                <input id="slot-date" placeholder="20260422 或 3">
            </div>
            <div>
                <label>开始时间</label>
                <input id="slot-start" placeholder="0650">
            </div>
            <div>
                <label>至少几小时</label>
                <input id="slot-hours" type="number" min="1" step="1" value="1">
            </div>
        </div>
        <div class="actions">
            <button onclick="loadConfig()">读取配置</button>
            <button onclick="applySlotRange()" class="secondary">生成连续时段</button>
            <button onclick="saveConfig()">保存配置</button>
            <button onclick="runNow()">立即运行一次</button>
        </div>
        <p class="small">连续时段会写成 start_time/end_time，例如 20260422-0650 到 20260422-0950。多个候选时段仍可用斜杠分隔。</p>
    </section>

    <section>
        <h2>预约任务</h2>
        <div class="grid">
            <div><label>任务名</label><input id="task-name" placeholder="wusi-0422-morning"></div>
            <div><label>任务配置</label><input id="task-config" value="config.ini"></div>
            <div><label>开始时间</label><input id="task-start" placeholder="留空则读取配置"></div>
            <div><label>最大尝试次数</label><input id="task-attempts" type="number" value="120"></div>
            <div><label>间隔秒数</label><input id="task-interval" type="number" value="5"></div>
            <div><label>提前秒数</label><input id="task-lead" type="number" value="60"></div>
        </div>
        <div class="actions">
            <button onclick="addTask()">添加任务</button>
            <button onclick="saveTasks()">保存任务</button>
            <button onclick="startScheduler()">启动调度器</button>
            <button onclick="stopScheduler()" class="danger">停止调度器</button>
        </div>
        <table>
            <thead><tr><th>启用</th><th>任务</th><th>配置</th><th>开始时间</th><th>重试</th><th>操作</th></tr></thead>
            <tbody id="tasks-body"></tbody>
        </table>
    </section>

    <section>
        <h2>状态与日志</h2>
        <div class="actions">
            <button onclick="refreshStatus()">刷新状态</button>
            <button onclick="refreshLogs()">刷新日志</button>
        </div>
        <div id="status" class="status"></div>
        <pre id="logs" class="status"></pre>
    </section>
</main>

<script>
const fields = [
    ["login", "user_name"], ["login", "password"], ["type", "venue"], ["type", "venue_num"],
    ["time", "start_time"], ["time", "end_time"], ["wechat", "wechat_notice"], ["wechat", "SCKEY"],
    ["chaojiying", "username"], ["chaojiying", "password"], ["chaojiying", "soft_id"],
    ["glm_ocr", "enabled"], ["glm_ocr", "endpoint"], ["glm_ocr", "timeout"], ["glm_ocr", "allow_chaojiying_fallback"]
];
let tasks = [];

function key(section, option) { return `${section}.${option}`; }
function fieldId(section, option) { return `field-${section}-${option}`; }

function renderFields(values) {
    const root = document.getElementById("config-fields");
    root.innerHTML = "";
    fields.forEach(([section, option]) => {
        const wrap = document.createElement("div");
        if (option === "start_time" || option === "end_time") wrap.className = "wide";
        wrap.innerHTML = `<label>${key(section, option)}</label><input id="${fieldId(section, option)}">`;
        root.appendChild(wrap);
        document.getElementById(fieldId(section, option)).value = (values[section] || {})[option] || "";
    });
}

async function loadConfig() {
    const path = document.getElementById("config-path").value || "config.ini";
    const res = await fetch(`/api/config?path=${encodeURIComponent(path)}`);
    const data = await res.json();
    document.getElementById("config-path").value = data.path;
    renderFields(data.values);
}

function collectConfigValues() {
    const values = {};
    fields.forEach(([section, option]) => {
        values[section] = values[section] || {};
        values[section][option] = document.getElementById(fieldId(section, option)).value;
    });
    const template = document.getElementById("venue-template").value;
    if (template) values.type.venue = template;
    return values;
}

async function saveConfig() {
    const payload = {path: document.getElementById("config-path").value || "config.ini", values: collectConfigValues()};
    const res = await fetch("/api/config", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(payload)});
    const data = await res.json();
    renderFields(data.values);
    document.getElementById("status").textContent = `已保存 ${data.path}`;
}

function addMinutes(hhmm, minutes) {
    const h = Number(hhmm.slice(0, 2));
    const m = Number(hhmm.slice(2, 4));
    const total = h * 60 + m + minutes;
    return `${String(Math.floor(total / 60)).padStart(2, "0")}${String(total % 60).padStart(2, "0")}`;
}

function applySlotRange() {
    const day = document.getElementById("slot-date").value.trim();
    const start = document.getElementById("slot-start").value.trim();
    const hours = Number(document.getElementById("slot-hours").value || "1");
    if (!day || !start || hours < 1) return;
    document.getElementById(fieldId("time", "start_time")).value = `${day}-${start}`;
    document.getElementById(fieldId("time", "end_time")).value = `${day}-${addMinutes(start, hours * 60)}`;
    document.getElementById("task-start").value = `${day}-${start}`;
}

async function runNow() {
    const payload = {config: document.getElementById("config-path").value || "config.ini", browser: document.getElementById("browser").value};
    document.getElementById("status").textContent = "运行中";
    const res = await fetch("/api/run", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify(payload)});
    const data = await res.json();
    document.getElementById("status").textContent = `returncode=${data.returncode}\n${data.stdout}\n${data.stderr}`;
}

function renderTasks() {
    const body = document.getElementById("tasks-body");
    body.innerHTML = "";
    tasks.forEach((task, index) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
            <td><input type="checkbox" ${task.enabled ? "checked" : ""} onchange="tasks[${index}].enabled=this.checked"></td>
            <td><input value="${task.name || ""}" onchange="tasks[${index}].name=this.value"></td>
            <td><input value="${task.config || "config.ini"}" onchange="tasks[${index}].config=this.value"></td>
            <td><input value="${task.start_time || ""}" onchange="tasks[${index}].start_time=this.value"></td>
            <td>${task.max_attempts || 120} 次 / ${task.interval_seconds || 5} 秒</td>
            <td><button class="danger" onclick="tasks.splice(${index},1);renderTasks()">删除</button></td>`;
        body.appendChild(tr);
    });
}

function addTask() {
    tasks.push({
        id: window.crypto && crypto.randomUUID ? crypto.randomUUID().slice(0, 12) : String(Date.now()),
        name: document.getElementById("task-name").value || document.getElementById("task-config").value,
        config: document.getElementById("task-config").value || "config.ini",
        browser: document.getElementById("browser").value,
        start_time: document.getElementById("task-start").value,
        max_attempts: Number(document.getElementById("task-attempts").value || 120),
        interval_seconds: Number(document.getElementById("task-interval").value || 5),
        lead_seconds: Number(document.getElementById("task-lead").value || 60),
        enabled: true
    });
    renderTasks();
}

async function loadTasks() {
    const res = await fetch("/api/tasks");
    tasks = (await res.json()).tasks || [];
    renderTasks();
}

async function saveTasks() {
    const res = await fetch("/api/tasks", {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({tasks})});
    tasks = (await res.json()).tasks || [];
    renderTasks();
    refreshStatus();
}

async function startScheduler() {
    await saveTasks();
    await fetch("/api/scheduler/start", {method: "POST"});
    refreshStatus();
}

async function stopScheduler() {
    await fetch("/api/scheduler/stop", {method: "POST"});
    refreshStatus();
}

async function refreshStatus() {
    const res = await fetch("/api/status");
    document.getElementById("status").textContent = JSON.stringify(await res.json(), null, 2);
}

async function refreshLogs() {
    const config = document.getElementById("config-path").value || "config.ini";
    const res = await fetch(`/api/logs?config=${encodeURIComponent(config)}`);
    const data = await res.json();
    document.getElementById("logs").textContent = (data.lines || []).join("\n");
}

loadConfig();
loadTasks();
refreshStatus();
setInterval(refreshStatus, 15000);
</script>
</body>
</html>
