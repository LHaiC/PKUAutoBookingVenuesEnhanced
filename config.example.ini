; 所有以“;”开头的行均为注释

;===================================

[login]
; 在此填入iaaa用户名与密码
user_name=
password=

;===================================

[wechat]
; 微信通知需要使用 PushPlus，请访问 https://www.pushplus.plus/push1.html
; True/False，1/0，yes/no
wechat_notice: False

; PushPlus token
SCKEY = XXXX

;===================================

[chaojiying]
; 识别验证码需要通过超级鹰的api
username:
password:
soft_id:

;===================================

[glm_ocr]
; true=使用本地GLM-OCR，false=不使用本地OCR
enabled = true
endpoint = http://localhost:8000
timeout = 20
; false=本地OCR失败时不点击且不调用超级鹰，true=临时允许超级鹰兜底
allow_chaojiying_fallback = false
