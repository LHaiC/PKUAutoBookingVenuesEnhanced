[glm_ocr]
; true=使用本地GLM-OCR，false=不使用本地OCR
enabled = true
endpoint = http://localhost:8000
timeout = 10
; false=本地OCR失败时不点击且不调用超级鹰，true=临时允许超级鹰兜底
allow_chaojiying_fallback = false
